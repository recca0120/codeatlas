pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      exclude: "public/data/**"
      run: pnpm biome check --write --staged {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm tsc --noEmit

pre-push:
  commands:
    summary:
      run: >
        pnpm tsx scripts/cli.ts summary &&
        git diff --quiet public/data/countries-summary.json ||
        (git add public/data/countries-summary.json &&
        git commit --no-verify -m "data: update countries-summary.json")
