<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CodeAtlas</title>
  <script>
    // GitHub Pages SPA fallback
    // Redirects all 404s to /app/ with the original path as a query param
    var base = '/codeatlas';
    var path = window.location.pathname;
    if (path.startsWith(base)) {
      path = path.slice(base.length);
    }
    window.location.replace(base + '/app/?route=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
