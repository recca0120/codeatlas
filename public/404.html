  <meta name="twitter:title" content="CodeAtlas — Global Developer Rankings">

  <script>
    // GitHub Pages SPA fallback with i18n support
    // Redirects all 404s to index with the original path as a query param
    var base = '/codeatlas';
    var path = window.location.pathname;
    if (path.startsWith(base)) {
      path = path.slice(base.length);
    }
    // Detect locale prefix
    var locale = '';
    if (path.startsWith('/zh-TW/')) {
      locale = '/zh-TW';
      path = path.slice('/zh-TW'.length);
    }
    window.location.replace(base + locale + '/?route=' + encodeURIComponent(path));
  </script>
</head>
