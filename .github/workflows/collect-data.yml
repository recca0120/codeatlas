name: Collect Data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code to collect (e.g. taiwan). Leave empty for checkpoint."
        required: false
        type: string
      limit:
        description: "Max users per country (e.g. 20 for testing). Leave empty for all."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "data-collection"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Collect data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          input_country="${{ inputs.country }}"
          collect_flags=""

          if [ -n "$input_country" ]; then
            collect_flags="-c $input_country"
          else
            collect_flags="--next"
          fi

          if [ -n "${{ inputs.limit }}" ]; then
            collect_flags="$collect_flags --limit ${{ inputs.limit }}"
          fi

          pnpm tsx scripts/cli.ts collect $collect_flags

      - name: Commit and push
        run: |
          git add public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Get country name from the changed files
          changed=$(git diff --staged --name-only | grep -oP '(?<=public/data/)[^.]+' | grep -v checkpoint | grep -v countries | head -1)
          if [ -n "$changed" ]; then
            git commit --no-verify -m "data: update $changed $(date -u +%Y-%m-%d) [skip ci]"
          else
            git commit --no-verify -m "data: update checkpoint $(date -u +%Y-%m-%d) [skip ci]"
          fi

          git pull --rebase origin main
          git push origin main
