name: Collect Data

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code to collect (e.g. taiwan). Leave empty for all."
        required: false
        type: string
      limit:
        description: "Max users per country (e.g. 20 for testing). Leave empty for all."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "data-collection"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup data-collection branch
        run: |
          git fetch origin data-collection 2>/dev/null || true
          if git rev-parse --verify origin/data-collection >/dev/null 2>&1; then
            git checkout data-collection
            git rebase origin/main
          else
            git checkout -b data-collection
          fi

      - name: Collect data per country
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          input_country="${{ inputs.country }}"
          if [ -n "$input_country" ]; then
            countries="$input_country"
          else
            countries=$(pnpm tsx scripts/cli.ts list-countries -p taiwan)
          fi

          collected=0
          failed=0

          for code in $countries; do
            collect_flags="-c $code"
            if [ -n "${{ inputs.limit }}" ]; then
              collect_flags="$collect_flags --limit ${{ inputs.limit }}"
            else
              collect_flags="$collect_flags --skip-today"
            fi
            if pnpm tsx scripts/cli.ts collect $collect_flags; then
              git add public/data/
              if ! git diff --staged --quiet; then
                git commit --no-verify -m "data: update $code $(date -u +%Y-%m-%d)"
                git push origin data-collection
                echo "  ✓ $code"
              else
                echo "  - $code (no changes)"
              fi
              collected=$((collected + 1))
            else
              failed=$((failed + 1))
              echo "  ✗ $code (failed, skipping)"
            fi
          done

          echo ""
          echo "Summary: $collected collected, $failed failed"

      - name: Squash merge to main
        run: |
          git checkout main
          git pull origin main

          # Need full history for diff
          git fetch origin data-collection

          if git diff --quiet main..origin/data-collection -- public/data/; then
            echo "No data changes to merge"
            exit 0
          fi

          git merge --squash origin/data-collection
          git commit --no-verify -m "data: update rankings $(date -u +%Y-%m-%d) [skip ci]"
          git push origin main

      - name: Clean up branch
        if: success()
        run: git push origin --delete data-collection 2>/dev/null || true
