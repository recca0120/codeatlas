name: Collect Data

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code to collect (e.g. taiwan). Leave empty for all."
        required: false
        type: string
      limit:
        description: "Max users per country (e.g. 20 for testing). Leave empty for all."
        required: false
        type: string
      force:
        description: "Force re-collect even if already collected today"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: "data-collection"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup data-collection branch
        run: git checkout -b data-collection

      - name: Collect data per country
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          input_country="${{ inputs.country }}"
          if [ -n "$input_country" ]; then
            countries="$input_country"
          else
            countries=$(pnpm tsx scripts/cli.ts list-countries -p taiwan)
          fi

          collected=0
          failed=0

          for code in $countries; do
            collect_flags="-c $code"
            if [ -n "${{ inputs.limit }}" ]; then
              collect_flags="$collect_flags --limit ${{ inputs.limit }}"
            elif [ "${{ inputs.force }}" != "true" ]; then
              collect_flags="$collect_flags --skip-today"
            fi
            if pnpm tsx scripts/cli.ts collect $collect_flags; then
              git add public/data/
              if ! git diff --staged --quiet; then
                git commit --no-verify -m "data: update $code $(date -u +%Y-%m-%d)"

                # Cherry-pick to main immediately
                git checkout main
                git pull origin main
                git cherry-pick data-collection
                git push origin main
                git checkout data-collection
                echo "  ✓ $code (merged to main)"
              else
                echo "  - $code (no changes)"
              fi
              collected=$((collected + 1))
            else
              failed=$((failed + 1))
              echo "  ✗ $code (failed, skipping)"
            fi
          done

          echo ""
          echo "Summary: $collected collected, $failed failed"

      - name: Squash data commits on main
        run: |
          git checkout main
          git pull origin main

          # Find the first data commit from this run
          first_data_commit=$(git log --oneline --grep="^data: update .* $(date -u +%Y-%m-%d)$" --reverse --format="%H" | head -1)
          if [ -z "$first_data_commit" ]; then
            echo "No data commits to squash"
            exit 0
          fi

          # Soft reset to before the first data commit, then recommit all as one
          git reset --soft "${first_data_commit}^"
          git commit --no-verify -m "data: update rankings $(date -u +%Y-%m-%d) [skip ci]"
          git push origin main --force-with-lease

      - name: Clean up branch
        if: always()
        run: git push origin --delete data-collection 2>/dev/null || true
