name: Collect Data

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code to collect (e.g. taiwan). Leave empty for all."
        required: false
        type: string
      limit:
        description: "Max users per country (e.g. 20 for testing). Leave empty for all."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "data-collection"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Collect data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          input_country="${{ inputs.country }}"
          if [ -n "$input_country" ]; then
            countries="$input_country"
          else
            countries=$(node -e "const c=require('./config/countries.json').map(x=>x.code);const p='taiwan';const i=c.indexOf(p);if(i>0){c.splice(i,1);c.unshift(p)}console.log(c.join(' '))")
          fi

          collected=0
          failed=0
          for code in $countries; do
            echo "Collecting $code..."
            limit_flag=""
            if [ -n "${{ inputs.limit }}" ]; then
              limit_flag="--limit ${{ inputs.limit }}"
            fi
            if pnpm tsx scripts/cli.ts collect -c "$code" $limit_flag; then
              collected=$((collected + 1))
              echo "  ✓ $code"
            else
              failed=$((failed + 1))
              echo "  ✗ $code (skipping)"
            fi
          done
          echo ""
          echo "Done: $collected collected, $failed failed"

      - name: Commit and push
        run: |
          git add public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit --no-verify -m "data: update rankings $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
